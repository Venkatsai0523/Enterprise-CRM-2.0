spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/nexus_crm
    username: crm_user
    password: crm_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: nexus-crm-group
      auto-offset-reset: earliest
