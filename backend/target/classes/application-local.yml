spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_crm
    username: crm_user
    password: crm_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: nexus-crm-group
      auto-offset-reset: earliest
